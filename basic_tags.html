<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基本HTML标签示例</title>
</head>
<body>
    <h1>一级标题</h1>
    <h2>二级标题</h2>
    <h3>三级标题</h3>
    
    <p>这是一个段落。HTML段落是通过p标签定义的。</p>
    
    <p>这是另一个段落，包含一个<a href="https://www.example.com" target="_blank">链接</a>。</p>
    
    <p>下面是一张图片：</p>
    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=beautiful%20landscape%20with%20mountains%20and%20lake&image_size=landscape_16_9" alt="风景图片" width="600">
    
    <p>HTML标签的使用需要注意嵌套规则，确保标签正确关闭。</p>
</body>
</html>
