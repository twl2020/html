<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML语义化标签示例</title>
</head>
<body>
    <header>
        <h1>网站标题</h1>
        <nav>
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">关于我们</a></li>
                <li><a href="#">产品</a></li>
                <li><a href="#">联系我们</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        <section>
            <h2>新闻资讯</h2>
            <article>
                <h3>最新技术趋势</h3>
                <p>这是一篇关于最新技术趋势的文章，讨论了人工智能、区块链等前沿技术的发展。</p>
            </article>
            <article>
                <h3>行业动态</h3>
                <p>这是一篇关于行业动态的文章，分析了当前市场的发展状况和未来趋势。</p>
            </article>
        </section>
        
        <section>
            <h2>产品展示</h2>
            <article>
                <h3>产品1</h3>
                <p>这是产品1的详细介绍，包括产品特点、功能和使用方法。</p>
            </article>
            <article>
                <h3>产品2</h3>
                <p>这是产品2的详细介绍，包括产品特点、功能和使用方法。</p>
            </article>
        </section>
        
        <aside>
            <h3>侧边栏</h3>
            <p>这里是侧边栏内容，可以放置广告、链接或其他相关信息。</p>
        </aside>
    </main>
    
    <footer>
        <p>&copy; 2026 网站名称. 保留所有权利.</p>
    </footer>
</body>
</html>
