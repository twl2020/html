<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML列表和表格示例</title>
</head>
<body>
    <h1>HTML列表和表格示例</h1>
    
    <h2>无序列表</h2>
    <ul>
        <li>苹果</li>
        <li>香蕉</li>
        <li>橙子</li>
        <li>葡萄</li>
    </ul>
    
    <h2>有序列表</h2>
    <ol>
        <li>第一步：准备材料</li>
        <li>第二步：烹饪食物</li>
        <li>第三步：享用美食</li>
        <li>第四步：清理餐具</li>
    </ol>
    
    <h2>嵌套列表</h2>
    <ul>
        <li>水果
            <ul>
                <li>苹果</li>
                <li>香蕉</li>
            </ul>
        </li>
        <li>蔬菜
            <ul>
                <li>西红柿</li>
                <li>黄瓜</li>
            </ul>
        </li>
    </ul>
    
    <h2>表格</h2>
    <table border="1">
        <thead>
            <tr>
                <th>姓名</th>
                <th>年龄</th>
                <th>职业</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>张三</td>
                <td>25</td>
                <td>工程师</td>
            </tr>
            <tr>
                <td>李四</td>
                <td>30</td>
                <td>教师</td>
            </tr>
            <tr>
                <td>王五</td>
                <td>28</td>
                <td>医生</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
