<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML注释和特殊字符示例</title>
</head>
<body>
    <!-- 这是一个HTML注释，不会在浏览器中显示 -->
    
    <h1>HTML注释和特殊字符示例</h1>
    
    <!-- 以下是特殊字符的示例 -->
    <h2>特殊字符示例</h2>
    
    <p>版权符号: &copy;</p>
    <p>注册商标: &reg;</p>
    <p>商标符号: &trade;</p>
    <p>小于号: &lt;</p>
    <p>大于号: &gt;</p>
    <p>和号: &amp;</p>
    <p>引号: &quot;</p>
    <p>撇号: &apos;</p>
    <p>空格: &nbsp;&nbsp;&nbsp;这是三个空格后的文本</p>
    <p>人民币符号: &yen;</p>
    <p>欧元符号: &euro;</p>
    <p>英镑符号: &pound;</p>
    <p>日元符号: &yen;</p>
    
    <!-- 注释可以跨多行
    这是注释的第二行
    这是注释的第三行
    -->
    
    <p>注释对于代码的维护和理解非常重要。</p>
    <p>特殊字符在HTML中需要使用实体编码来表示。</p>
</body>
</html>
